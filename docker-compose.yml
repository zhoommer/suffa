services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: suffa:latest
    container_name: suffa-app
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    extra_hosts:
      - 'kc.homelab.local:{KC_HOST}'
